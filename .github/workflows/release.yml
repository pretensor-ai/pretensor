name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12"
      - name: Verify tag matches pyproject version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(uv run python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          [ "$tag" = "$pkg" ] || { echo "tag $tag != pyproject $pkg"; exit 1; }
      - name: Build sdist + wheel
        run: uv build
      - name: Validate distributions
        run: uvx twine check --strict dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  detect:
    name: Classify tag
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.check.outputs.is_prerelease }}
    steps:
      - id: check
        run: |
          if [[ "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(a|b|rc)[0-9]+$ ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  test-pypi:
    name: Publish to TestPyPI (prereleases only)
    needs: [build, detect]
    if: needs.detect.outputs.is_prerelease == 'true'
    runs-on: ubuntu-latest
    environment:
      name: testpypi-release
      url: https://test.pypi.org/project/pretensor/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  pypi:
    name: Publish to PyPI
    needs: [build, detect, test-pypi]
    if: >-
      always() &&
      needs.build.result == 'success' &&
      (needs.test-pypi.result == 'success' || needs.test-pypi.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: pypi-release
      url: https://pypi.org/project/pretensor/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
